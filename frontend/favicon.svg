<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="purpleBlue" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Mortar bowl (bottom half-ellipse) -->
  <path d="M14 40 Q14 54 32 54 Q50 54 50 40 Z" fill="url(#purpleBlue)" opacity="0.9"/>

  <!-- Mortar rim (top ellipse outline) -->
  <ellipse cx="32" cy="40" rx="18" ry="5" fill="#0a0a1a" stroke="url(#purpleBlue)" stroke-width="2"/>

  <!-- Pestle stick -->
  <rect x="29.5" y="14" width="5" height="28" rx="2.5" fill="url(#purpleBlue)"/>

  <!-- Pestle head (top rounded bulge) -->
  <ellipse cx="32" cy="15" rx="6" ry="4" fill="url(#purpleBlue)"/>

  <!-- Green medical cross badge (bottom-right) -->
  <circle cx="50" cy="50" r="11" fill="url(#greenGrad)"/>
  <!-- Cross horizontal bar -->
  <rect x="43.5" y="48" width="13" height="4" rx="2" fill="white"/>
  <!-- Cross vertical bar -->
  <rect x="48" y="43.5" width="4" height="13" rx="2" fill="white"/>
</svg>
